# EV Tender Keywords Configuration
# Edit this file to add/remove keywords without touching Python code.
#
# Structure:
#   simple_en / simple_ar  — direct substring match
#   compound_en / compound_ar — keyword matches ONLY if one of its context words also appears
#   negative               — reject tender if ANY of these appear (shared across companies)
#
# Context words in compound keywords use WORD-BOUNDARY matching for Latin words
# (e.g. "ev" won't match "development", "electric" won't match "electrical").
# Arabic context words use substring matching.

# ---------------------------------------------------------------------------
# Negative keywords — reject tender regardless of positive match
# ---------------------------------------------------------------------------
negative:
  - drone
  - railway
  - railroad
  - rail line
  - metro line
  - tramway
  - forklift
  - generator set
  - elevator
  - escalator
  - phone charger
  - laptop charger
  - ups battery
  - street lighting
  - road lighting
  - traffic signal
  - substation
  - transformer
  - cable laying
  - data center
  - website development
  - mobile application development
  - battery energy storage
  - energy storage system

